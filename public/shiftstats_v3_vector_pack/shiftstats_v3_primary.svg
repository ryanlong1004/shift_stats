<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gBar" x1="0" y1="200" x2="0" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#16A34A"/>
      <stop offset="1" stop-color="#4ADE80"/>
    </linearGradient>
  </defs>

  <!-- Icon -->
  <g transform="translate(40,40)">
    <!-- ring -->
    <circle cx="120" cy="120" r="104" fill="none" stroke="#0F172A" stroke-width="14"/>

    <!-- bars -->
    <rect x="70" y="150" width="28" height="70" rx="6" fill="url(#gBar)"/>
    <rect x="112" y="120" width="28" height="100" rx="6" fill="url(#gBar)"/>
    <rect x="154" y="90" width="28" height="130" rx="6" fill="url(#gBar)"/>

    <!-- trend line (energy, no arrowhead) -->
    <path d="M76 170 L126 140 L168 110" stroke="#22C55E" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- wordmark -->
  <text x="360" y="190"
        fill="#0F172A"
        font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif"
        font-size="120"
        font-weight="700"
        letter-spacing="-3">ShiftStats</text>
</svg>
