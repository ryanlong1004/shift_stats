services:
  postgres:
    image: postgres:16-alpine
    container_name: shiftstats-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: shiftstats
      POSTGRES_PASSWORD: shiftstats
      POSTGRES_DB: shiftstats
    ports:
      - "5432:5432"
    volumes:
      - shiftstats-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shiftstats -d shiftstats"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  shiftstats-postgres-data:
